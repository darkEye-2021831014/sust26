services:
  - type: web
    name: queuestorm-investigator
    runtime: docker
    plan: starter
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: queuestorm
      - key: AI_PROVIDER
        value: primary
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      # Leave INTERNAL_API_KEY empty to keep the API in "open mode"
      # (recommended for the evaluation harness). Set a value to require
      # an X-Api-Key header on every non-public request.
      - key: INTERNAL_API_KEY
        value: ""
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: LLM_TIMEOUT_MS
        value: 25000
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: "*"
